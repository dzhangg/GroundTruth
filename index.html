<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroundTruth — Earthquake Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100vw; }

    .legend {
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      font-size: 12px;
      line-height: 1.9;
    }
    .legend-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-right: 5px;
      border: 1px solid rgba(0, 0, 0, 0.25);
      vertical-align: middle;
    }
    .legend-note { font-size: 10px; color: #777; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Map setup ──────────────────────────────────────────────────────────────
    const map = L.map('map', { preferCanvas: true }).setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' +
        ' | Seismicity: <a href="https://earthquake.usgs.gov/">USGS</a>'
    }).addTo(map);

    // ── Color + size helpers ───────────────────────────────────────────────────
    function magColor(mag) {
      if (mag < 5.0) return '#00b300';  // green    — minor
      if (mag < 5.5) return '#80cc00';  // lime     — light
      if (mag < 6.0) return '#ffcc00';  // yellow   — moderate
      if (mag < 6.5) return '#ff8000';  // orange   — strong
      if (mag < 7.0) return '#ff0000';  // red      — major
      return '#990000';                  // dark red — great
    }

    function magRadius(mag) {
      // Exponential growth: M5 → ~3 px, M6 → ~6 px, M7 → ~12 px, M8+ → ~24 px
      return Math.pow(2, mag - 4) * 1.5;
    }

    // ── Load GeoJSON and plot ──────────────────────────────────────────────────
    fetch('earthquakes.geojson')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        L.geoJSON(data, {
          filter: f => f.properties.title !== 'Legend',

          pointToLayer: (feature, latlng) => {
            const mag = feature.properties.magnitude;
            return L.circleMarker(latlng, {
              radius:      magRadius(mag),
              fillColor:   magColor(mag),
              color:       'rgba(0,0,0,0.45)',
              weight:      0.5,
              fillOpacity: 0.8
            });
          },

          onEachFeature: (feature, layer) => {
            const p   = feature.properties;
            const lon = feature.geometry.coordinates[0];
            const lat = feature.geometry.coordinates[1];
            const latStr = Math.abs(lat).toFixed(3) + '°' + (lat >= 0 ? 'N' : 'S');
            const lonStr = Math.abs(lon).toFixed(3) + '°' + (lon >= 0 ? 'E' : 'W');

            layer.bindPopup(`
              <b style="font-size:14px">${p.title}</b><br>
              <span style="color:${magColor(p.magnitude)}">&#9679;</span>
              <b>M${p.magnitude.toFixed(1)}</b> &mdash; ${p.depth_km}&thinsp;km deep<br>
              ${p.date}<br>
              ${latStr}, ${lonStr}<br>
              <a href="${p.url}" target="_blank" rel="noopener"
                 style="color:#0066cc;font-weight:600;">&#8599;&nbsp;USGS Event Page</a>
            `, { maxWidth: 300 });
          }
        }).addTo(map);
      })
      .catch(err => {
        document.body.innerHTML =
          '<p style="padding:20px;color:#c00;font-size:14px">' +
          '<b>Could not load earthquakes.geojson</b><br>' +
          err.message + '<br><br>' +
          'Run <code>python earthquake_explorer.py</code> to generate the data file, ' +
          'then serve locally with <code>python -m http.server</code> and open ' +
          '<a href="http://localhost:8000">http://localhost:8000</a>.' +
          '</p>';
      });

    // ── Legend ─────────────────────────────────────────────────────────────────
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      const tiers = [
        ['#00b300', 'M &lt; 5.0',      'Minor'],
        ['#80cc00', 'M 5.0&ndash;5.5', 'Light'],
        ['#ffcc00', 'M 5.5&ndash;6.0', 'Moderate'],
        ['#ff8000', 'M 6.0&ndash;6.5', 'Strong'],
        ['#ff0000', 'M 6.5&ndash;7.0', 'Major'],
        ['#990000', 'M &ge; 7.0',      'Great'],
      ];
      div.innerHTML =
        '<div class="legend-title">Magnitude</div>' +
        tiers.map(([c, m, l]) =>
          `<div><span class="dot" style="background:${c}"></span>${m} &mdash; ${l}</div>`
        ).join('') +
        '<div class="legend-note">Dot size grows with magnitude</div>';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
